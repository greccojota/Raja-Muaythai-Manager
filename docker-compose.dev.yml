version: "3.9"

services:
  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development

  frontend:
    image: node:22-alpine
    container_name: raja-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      VITE_API_URL: http://localhost:8000

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: raja-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@raja.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
